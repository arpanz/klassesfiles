name: Timetable Automation

on:
  workflow_dispatch:
    inputs:
      batch:
        description: 'Admission year (e.g. 2023)'
        required: true
      semester:
        description: 'Semester number (e.g. 6) — required for timetable, optional for roll'
        required: false
        default: ''
      file_type:
        description: 'timetable or roll'
        required: true
        default: 'timetable'
      update_type:
        description: 'merge or replace'
        required: true
        default: 'merge'
      pe3:
        description: 'true if section-assigned elective resolution needed (timetable only)'
        required: false
        default: 'false'
      file_content:
        description: 'Base64 Encoded File'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: timetable-publish
  cancel-in-progress: false

jobs:
  process-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl xlrd

      - name: Decode input file
        run: echo "${{ inputs.file_content }}" | base64 -d > input_data.xlsx

      - name: Run timetable parser
        if: inputs.file_type == 'timetable'
        id: parse_tt
        run: |
          PE3_FLAG=""
          if [ "${{ inputs.pe3 }}" = "true" ]; then PE3_FLAG="--pe3"; fi
          python scripts/tt_parser.py input_data.xlsx \
            --batch ${{ inputs.batch }} \
            --semester ${{ inputs.semester }} \
            --mode ${{ inputs.update_type }} \
            $PE3_FLAG 2>&1 | tee parse.log
          exit ${PIPESTATUS[0]}

      - name: Run roll number parser
        if: inputs.file_type == 'roll'
        id: parse_roll
        run: |
          python scripts/rollno_parser.py input_data.xlsx \
            --batch ${{ inputs.batch }} \
            --mode ${{ inputs.update_type }} \
            2>&1 | tee parse.log
          exit ${PIPESTATUS[0]}

      - name: Publish (auto for SMALL, hold via PR for BIG)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Timetable Bot"
          git config user.email "bot@klasses.app"

          # Only consider JSON data files (ignore parse.log / changes.txt / change_level.txt).
          if [ -z "$(git status --porcelain -- '*.json')" ]; then
            echo "No data changes — nothing to publish."
            echo "PUBLISH_RESULT=none" >> "$GITHUB_ENV"
            exit 0
          fi

          # Data changed → bump the manifest version now (not on identical re-uploads).
          python scripts/bump_manifest.py \
            --batch ${{ inputs.batch }} \
            --file-type ${{ inputs.file_type }} 2>&1 | tee -a parse.log

          # Roll uploads have no change_level → treat as SMALL (you upload those yourself).
          LEVEL="SMALL"
          if [ -f change_level.txt ]; then LEVEL=$(cat change_level.txt); fi

          if [ "$LEVEL" = "BIG" ]; then
            BR="held-${{ inputs.batch }}-${{ github.run_number }}"
            git checkout -b "$BR"
            git add *.json
            git commit -m "HELD: batch ${{ inputs.batch }} ${{ inputs.file_type }} (${{ inputs.update_type }}) — needs approval"
            git push origin "$BR"
            PR_URL=$(gh pr create --base master --head "$BR" \
              --title "Review timetable update — batch ${{ inputs.batch }} (${{ inputs.file_type }})" \
              --body "Automated update flagged as a **BIG change** and held for approval.$(printf '\n\n')Review the diff below, then **merge to publish** or **close to discard**.$(printf '\n\n')\`\`\`$(printf '\n')$(cat changes.txt)$(printf '\n')\`\`\`")
            echo "PUBLISH_RESULT=held"  >> "$GITHUB_ENV"
            echo "PR_URL=$PR_URL"       >> "$GITHUB_ENV"
          else
            git add *.json
            git commit -m "Auto-update: batch ${{ inputs.batch }} ${{ inputs.file_type }} (${{ inputs.update_type }})"
            git push
            echo "PUBLISH_RESULT=published" >> "$GITHUB_ENV"
          fi

      - name: Notify Telegram (success)
        if: success()
        run: |
          RESULT="${PUBLISH_RESULT:-published}"
          if [ -f changes.txt ]; then CHANGES=$(cat changes.txt); else CHANGES=$(grep -E 'WROTE::|BUMPED::' parse.log | tr '\n' ' ' || echo "done"); fi

          if [ "$RESULT" = "none" ]; then
            BODY="ℹ️ ${{ inputs.file_type }} upload — no changes detected (Batch ${{ inputs.batch }}). Nothing published."
          elif [ "$RESULT" = "held" ]; then
            BODY="⏸️ HELD FOR APPROVAL — Batch ${{ inputs.batch }} (${{ inputs.file_type }})
          A big change was detected and is NOT live yet.
          Review & merge to publish (or close to discard):
          ${PR_URL}
          ━━━━━━━━━━━━━━━━━━
          $CHANGES"
          else
            BODY="✅ ${{ inputs.file_type }} PUBLISHED — Batch ${{ inputs.batch }} (${{ inputs.update_type }})
          ━━━━━━━━━━━━━━━━━━
          $CHANGES"
          fi

          BODY=$(printf '%s' "$BODY" | head -c 3800)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$BODY"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          REASON=$(grep 'VALIDATION_FAILED::' parse.log || tail -n 5 parse.log || echo "unknown error")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ ${{ inputs.file_type }} upload REJECTED%0ABatch: ${{ inputs.batch }}%0AReason: $REASON"
